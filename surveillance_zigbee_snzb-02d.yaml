blueprint:
  name: Capteur Zigbee - Surveillance pile et inactivité
  description: >
    Alerte si un capteur ne répond plus depuis X heures
    ou si sa batterie passe sous un seuil défini.
  domain: automation
  input:
    capteur_temperature:
      name: Capteur de température
      selector:
        entity:
          domain: sensor
          device_class: temperature
    capteur_batterie:
      name: Capteur de batterie
      selector:
        entity:
          domain: sensor
          device_class: battery
    seuil_batterie:
      name: Seuil batterie (%)
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: "%"
    delai_inactivite:
      name: Délai d inactivite en heures
      default: 2
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: "h"
    notify_device:
      name: Appareil à notifier
      description: "L'appareil doit avoir l'application Home Assistant installée."
      selector:
        device:
          filter:
            integration: mobile_app

variables:
  capteur_temp: !input capteur_temperature
  capteur_batt: !input capteur_batterie
  delai_h: !input delai_inactivite

trigger:
  - platform: numeric_state
    id: batterie_faible
    entity_id: !input capteur_batterie
    below: !input seuil_batterie
  - platform: time_pattern
    id: check_inactivite
    minutes: "/30"

condition:
  - condition: or
    conditions:
      - condition: trigger
        id: batterie_faible
      - condition: and
        conditions:
          - condition: trigger
            id: check_inactivite
          - condition: template
            value_template: >
              {{ (now() - states[capteur_temp].last_updated).total_seconds()
                 > delai_h * 3600 }}

action:
  # Notification mobile
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: >
      Capteur Zigbee : {{ state_attr(capteur_temp, 'friendly_name')
      | default(capteur_temp) }}
    message: >
      {% if trigger.id == 'batterie_faible' %}
      Batterie faible : {{ states(capteur_batt) }}%
      {% else %}
      Inactif depuis : {{ relative_time(states[capteur_temp].last_updated) }}
      {% endif %}
      Pensez a verifier la pile !

  # Notification persistante dans l'IHM HA
  - service: persistent_notification.create
    data:
      title: >
        Capteur Zigbee : {{ state_attr(capteur_temp, 'friendly_name')
        | default(capteur_temp) }}
      message: >
        {% if trigger.id == 'batterie_faible' %}
        Batterie faible : {{ states(capteur_batt) }}%
        {% else %}
        Inactif depuis : {{ relative_time(states[capteur_temp].last_updated) }}
        {% endif %}
        Pensez a verifier la pile !
      notification_id: >
        zigbee_{{ capteur_temp }}
        
  # Notification Telegram
  - service: telegram_bot.send_message
    data:
      chat_id: -4760434116
      message: >
        Capteur Zigbee : {{ state_attr(capteur_temp, 'friendly_name')
        | default(capteur_temp) }}
        {% if trigger.id == 'batterie_faible' %}
        Batterie faible : {{ states(capteur_batt) }}%
        {% else %}
        Inactif depuis : {{ relative_time(states[capteur_temp].last_updated) }}
        {% endif %}
        Pensez a verifier la pile !
