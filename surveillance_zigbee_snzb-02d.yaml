blueprint:
  name: Capteur Zigbee - Surveillance pile et inactivité
  description: >
    Alerte si un capteur ne répond plus depuis X heures 
    ou si sa batterie passe sous un seuil défini.
  domain: automation
  input:
    capteur_temperature:
      name: Capteur de température
      description: Entité température du capteur Zigbee
      selector:
        entity:
          domain: sensor
          device_class: temperature

    capteur_batterie:
      name: Capteur de batterie
      description: Entité batterie du même capteur
      selector:
        entity:
          domain: sensor
          device_class: battery

    seuil_batterie:
      name: Seuil batterie (%)
      description: Alerte si la batterie descend sous ce seuil
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: "%"

    delai_inactivite:
      name: Délai d'inactivité (heures)
      description: Alerte si aucune donnée reçue depuis ce délai
      default: 2
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: "h"

    service_notification:
      name: Service de notification
      description: "Ex: notify mobile_app_mon_telephone"
      selector:
        text:

trigger:
  # Trigger 1 — batterie faible
  - platform: numeric_state
    id: batterie_faible
    entity_id: !input capteur_batterie
    below: !input seuil_batterie

  # Trigger 2 — inactivité (vérification toutes les 30 min)
  - platform: time_pattern
    id: check_inactivite
    minutes: "/30"

condition:
  - condition: or
    conditions:
      # Condition pour trigger batterie
      - condition: trigger
        id: batterie_faible

      # Condition pour trigger inactivité
      - condition: and
        conditions:
          - condition: trigger
            id: check_inactivite
          - condition: template
            value_template: >
              {% set delai = expand(trigger.entity_id | default('')) %}
              {% set heures = iif(delai == '', !input delai_inactivite, !input delai_inactivite) %}
              {{ (now() - states[!input capteur_temperature].last_updated).total_seconds() 
                 > (!input delai_inactivite) * 3600 }}

action:
  - variables:
      nom_capteur: "{{ state_attr(!input capteur_temperature, 'friendly_name') or !input capteur_temperature }}"
      batterie: "{{ states(!input capteur_batterie) }}"
      derniere_maj: >
        {{ relative_time(states[!input capteur_temperature].last_updated) }}
      raison: >
        {% if trigger.id == 'batterie_faible' %}
          🔋 Batterie faible : {{ batterie }}%
        {% else %}
          📡 Inactif depuis : {{ derniere_maj }}
        {% endif %}

  - service: !input service_notification
    data:
      title: "⚠️ Capteur Zigbee — {{ nom_capteur }}"
      message: >
        {{ raison }}
        — Pensez à vérifier la pile !
