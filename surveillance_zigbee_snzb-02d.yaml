blueprint:
  name: Capteur Zigbee - Surveillance pile et inactivité
  description: >
    Alerte si un capteur ne répond plus depuis X heures
    ou si sa batterie passe sous un seuil défini.
  domain: automation
  input:
    capteur_temperature:
      name: Capteur de température
      selector:
        entity:
          domain: sensor
          device_class: temperature

    capteur_batterie:
      name: Capteur de batterie
      selector:
        entity:
          domain: sensor
          device_class: battery

    seuil_batterie:
      name: Seuil batterie (%)
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: "%"

    delai_inactivite:
      name: Délai d inactivite en heures
      default: 2
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: "h"

    notify_device:
      name: Device to notify
      description: Device needs to run the official Home Assistant app to receive notifications.
      selector:
        device:
          filter:
            integration: mobile_app

trigger:
  - platform: numeric_state
    id: batterie_faible
    entity_id: !input capteur_batterie
    below: !input seuil_batterie

  - platform: time_pattern
    id: check_inactivite
    minutes: "/30"

condition:
  - condition: or
    conditions:
      - condition: trigger
        id: batterie_faible
      - condition: and
        conditions:
          - condition: trigger
            id: check_inactivite
          - condition: template
            value_template: >
              {{ (now() - states[!input capteur_temperature].last_updated).total_seconds()
                 > !input delai_inactivite * 3600 }}

action:
  - service: !input service_notification
    data:
      title: >
        Capteur Zigbee : {{ state_attr(!input capteur_temperature, 'friendly_name')
        | default(!input capteur_temperature) }}
      message: >
        {% if trigger.id == 'batterie_faible' %}
        Batterie faible : {{ states(!input capteur_batterie) }}%
        {% else %}
        Inactif depuis : {{ relative_time(states[!input capteur_temperature].last_updated) }}
        {% endif %}
        Pensez a verifier la pile !

mode: single
